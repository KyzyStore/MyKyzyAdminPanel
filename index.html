<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kyzy SMM Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
  text-align:center;
}

h1{ margin:20px; color:#38bdf8; }

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:12px;
  padding:16px;
  margin:10px;
  width:300px;
  box-shadow:0 0 15px rgba(56,189,248,.3);
}

select,input{
  width:90%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  padding:10px;
  width:95%;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

#adminBox{
  display:none;
  margin:20px;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}
</style>
</head>

<body>

<button onclick="toggleAdmin()">⚙️ Admin</button>

<div id="adminBox">
<h3>🔐 Admin Nokos</h3>
<input id="adminUser" placeholder="Username">
<input id="adminPass" type="password" placeholder="Password">
<button onclick="loginAdmin()">Login</button>

<div id="adminPanel" style="display:none;">
<p>Harga Nokos:</p>
<input id="setHarga" type="number">
<p>Stok Nokos:</p>
<input id="setStok" type="number">
<button onclick="saveAdmin()">💾 Simpan</button>
</div>
</div>

<h1>🚀 KYZY SMM PANEL</h1>

<div class="container">

<script>
// ===== PAKET =====
function paketHTML(type,id){
const data = {
igf:[1000,2000,3000,4000,5000,6000,7000,8000,9000,10000],
igl:[1000,2000,3000,4000,5000,6000,7000,8000,9000,10000],
igv:[1000,2000,3000,4000,5000,6000,7000,8000,9000,10000],
ttf:[4000,6000,8000,10000,12000,14000,16000,18000,20000,22000],
ttl:[1000,2000,3000,4000,5000,6000,7000,8000,9000,10000],
ttv:[1000,2000,3000,4000,5000,6000,7000,8000,9000,10000],
wac:[5000,9000,13000,17000,21000,25000,28000,32000,36000,40000],
react:[3000,6000,9000,12000,15000,17000,20000,23000,26000,29000]
};

let html = `<select id="paket${id}" onchange="hitung('paket${id}','total${id}')">
<option value="">Pilih Paket</option>`;

let qty = [100,200,300,400,500,600,700,800,900,1000];

data[type].forEach((h,i)=>{
html += `<option data-harga="${h}">${qty[i]} - Rp${h.toLocaleString("id-ID")}</option>`;
});

html += `</select>`;
return html;
}

// ===== CARD =====
function card(id,title,type,placeholder){
return `
<div class="card">
<h3>${title}</h3>
<input id="link${id}" placeholder="${placeholder}">
${paketHTML(type,id)}
<p>Rp <span id="total${id}">0</span></p>
<button onclick="order('${title}','link${id}','paket${id}')">Order</button>
</div>`;
}

// ===== RENDER =====
document.write(
card(1,"IG Followers","igf","Link IG")+
card(2,"IG Likes","igl","Link Post")+
card(3,"IG Views","igv","Link Reels")+
card(4,"TikTok Followers","ttf","Link TikTok")+
card(5,"TikTok Likes","ttl","Link Video")+
card(6,"TikTok Views","ttv","Link Video")+
card(7,"WhatsApp Member","wac","Link Saluran")+
card(8,"WhatsApp Reaction","react","Link Post")
);

// ===== HITUNG =====
function hitung(selectId,totalId){
let s=document.getElementById(selectId);
let h=s.options[s.selectedIndex].dataset.harga;
if(!h)return;
document.getElementById(totalId).innerText=
Number(h).toLocaleString("id-ID");
}

// ===== ORDER SOSMED =====
function order(jenis,linkId,paketId){
let link=document.getElementById(linkId).value;
let s=document.getElementById(paketId);
let paket=s.options[s.selectedIndex].text;
let harga=s.options[s.selectedIndex].dataset.harga;

if(!link)return alert("Isi link dulu");
if(!harga)return alert("Pilih paket dulu");

window.open("https://wa.me/62895324562321?text="+encodeURIComponent(
`Halo Admin 🚀
Order ${jenis}

Paket: ${paket}
Total: Rp ${Number(harga).toLocaleString("id-ID")}
Link: ${link}`
));
}

// ===== NOKOS =====
function getHargaNokos(){
return Number(localStorage.getItem("hargaNokos"))||5000;
}
function getStok(){
return Number(localStorage.getItem("stokNokos"))||5;
}function updateUI(){
let hargaEl = document.getElementById("hargaNokos");
let stokEl = document.getElementById("stokNokos");

if(!hargaEl || !stokEl) return; // ⛔ biar ga error

hargaEl.innerText = getHargaNokos().toLocaleString("id-ID");
stokEl.innerText = "Stok: " + getStok();
}
function orderNokos(){
let stok=getStok();
if(stok<=0)return alert("Nokos habis!");
localStorage.setItem("stokNokos",stok-1);
updateUI();

window.open("https://wa.me/62895324562321?text="+encodeURIComponent(
`Halo Admin 🚀
Order NOKOS INDONESIA 🇮🇩

Total: Rp ${getHargaNokos()}`
));
}

// ===== ADMIN =====
function toggleAdmin(){
adminBox.style.display=
adminBox.style.display==="none"?"block":"none";
}
function loginAdmin(){
if(adminUser.value==="admin"&&adminPass.value==="kyzy123"){
adminPanel.style.display="block";
setHarga.value=getHargaNokos();
setStok.value=getStok();
}else alert("Login salah!");
}
function saveAdmin(){
localStorage.setItem("hargaNokos",setHarga.value);
localStorage.setItem("stokNokos",setStok.value);
updateUI();
alert("Tersimpan!");
}

// INIT
updateUI();

window.onload = function(){
  updateUI();
}
</script>

<!-- NOKOS (SUDAH NYATU) -->
<div class="card">
<h3>📱 Nokos Indonesia 🇮🇩</h3>
<p>Harga: Rp <span id="hargaNokos"></span></p>
<p id="stokNokos"></p>
<button onclick="orderNokos()">⚡ Beli Nokos</button>
</div>

</div>

</body>
</html>
