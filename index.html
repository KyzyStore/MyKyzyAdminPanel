<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kyzy SMM Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
  text-align:center;
}

h1{ color:#38bdf8; }

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:12px;
  padding:16px;
  margin:10px;
  width:260px;
}

input, select{
  width:90%;
  padding:8px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  padding:10px;
  width:95%;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  cursor:pointer;
}

#overlay{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.spinner{
  border:5px solid #333;
  border-top:5px solid #38bdf8;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h2>🔐 Admin Login</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPage" style="display:none;">
<h2>⚙️ Admin Panel</h2>

<div id="adminList"></div>

<button onclick="simpan()">💾 Simpan</button>
<button onclick="logout()">🚪 Logout</button>
</div>

<h1>🚀 KYZY SMM PANEL</h1>

<div class="container" id="panel"></div>

<!-- overlay -->
<div id="overlay">
<div>
<div class="spinner"></div>
<p>Memproses...</p>
</div>
</div>

<script>

// ===== DATA =====
const services = [
{key:"igf", name:"IG Followers", harga:8},
{key:"igl", name:"IG Likes", harga:6},
{key:"igv", name:"IG Views", harga:1},

{key:"ttf", name:"TikTok Followers", harga:35},
{key:"ttl", name:"TikTok Likes", harga:7},
{key:"ttv", name:"TikTok Views", harga:1},

{key:"wac", name:"WA Member", harga:50},
{key:"react", name:"WA Reaction", harga:30},

{key:"nokos", name:"Nokos Indo", harga:5000}
];

// ===== GET =====
function getHarga(k,d){ return Number(localStorage.getItem(k))||d }
function getStatus(k){ return localStorage.getItem("status_"+k)||"on" }
function getStok(){ return Number(localStorage.getItem("stokNokos"))||0 }

// ===== BUILD PANEL =====
function buildPanel(){
let panel = document.getElementById("panel");
panel.innerHTML="";

services.forEach((s,i)=>{
panel.innerHTML+=`
<div class="card">
<h3>${s.name}</h3>
<p id="status_${s.key}"></p>

<input id="link${i}" placeholder="Masukkan link">
<input id="jumlah${i}" type="number"
oninput="hitung('jumlah${i}','total${i}','${s.key}')">

<p>Rp <span id="total${i}">0</span></p>

<button id="btn_${s.key}"
onclick="order('${s.key}','link${i}','jumlah${i}')">Order</button>
</div>`;
});
}

// ===== BUILD ADMIN =====
function buildAdmin(){
let html="";
services.forEach(s=>{
html+=`
<p>${s.name}</p>
Harga: <input id="${s.key}"><br>
Status:
<select id="status_${s.key}">
<option value="on">ON</option>
<option value="off">OFF</option>
</select><br><br>
`;
});

html+=`<p>Stok Nokos</p>
<input id="stokNokos"><br><br>`;

document.getElementById("adminList").innerHTML=html;
}

// ===== LOAD ADMIN =====
function loadAdmin(){
services.forEach(s=>{
document.getElementById(s.key).value = getHarga(s.key,s.harga);
document.getElementById("status_"+s.key).value = getStatus(s.key);
});
document.getElementById("stokNokos").value = getStok();
}

// ===== SIMPAN =====
function simpan(){
services.forEach(s=>{
localStorage.setItem(s.key, document.getElementById(s.key).value);
localStorage.setItem("status_"+s.key, document.getElementById("status_"+s.key).value);
});
localStorage.setItem("stokNokos", document.getElementById("stokNokos").value);
alert("Tersimpan!");
location.reload();
}

// ===== LOGIN =====
function login(){
if(user.value=="AdminGanteng" && pass.value=="SmartPanel"){
loginPage.style.display="none";
adminPage.style.display="block";
buildAdmin();
loadAdmin();
}else alert("Salah");
}

function logout(){ location.reload(); }

// ===== HITUNG =====
function hitung(jumlahId,totalId,jenis){
let j = document.getElementById(jumlahId).value||0;
let h = getHarga(jenis,1);
document.getElementById(totalId).innerText =
(j*h).toLocaleString("id-ID");
}

// ===== STATUS UPDATE =====
function updateStatus(){
services.forEach(s=>{
let st = getStatus(s.key);
let el = document.getElementById("status_"+s.key);
let btn = document.getElementById("btn_"+s.key);

if(!el || !btn) return;

if(st==="on"){
el.innerText="✅ Online";
btn.disabled=false;
}else{
el.innerText="❌ Error";
btn.disabled=true;
}
});
}

// ===== ORDER =====
function order(jenis, linkId, jumlahId){
  let link = document.getElementById(linkId).value;
  let jumlah = document.getElementById(jumlahId).value;
  let hargaPer = getHarga(jenis, 0);
  let total = jumlah * hargaPer;

  let overlay = document.getElementById("overlay");

  if(!link) return alert("Isi link dulu");
  if(total < 500) return alert("Min 500");

  // khusus nokos
  if(jenis === "nokos"){
    let stok = getStok();
    if(stok <= 0) return alert("Stok habis!");
    localStorage.setItem("stokNokos", stok - 1);
  }

  let pesan = "Halo Admin\n" +
  "Order " + jenis.toUpperCase() + "\n\n" +
  "Jumlah: " + jumlah + "\n" +
  "Total: Rp " + total + "\n" +
  "Link: " + link;

  // tampil animasi
  overlay.style.display = "flex";

  setTimeout(() => {
    window.location.href =
      "https://wa.me/62895324562321?text=" +
      encodeURIComponent(pesan);
  }, 800);
}

// ===== INIT =====
buildPanel();
updateStatus();

</script>

</body>
</html
